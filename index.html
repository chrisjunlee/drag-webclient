<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dRAG — Book RAG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Setup Overlay -->
  <div id="setup-overlay" class="overlay">
    <div class="setup-card">
      <h1>dRAG</h1>
      <p class="setup-subtitle">Derek's Custom RAG</p>
      <form id="setup-form">
        <label for="setup-key">API Key</label>
        <input type="password" id="setup-key" placeholder="Your AnythingLLM API key" required>

        <label for="setup-slug">Workspace Name</label>
        <input type="text" id="setup-slug" placeholder="my-workspace" required>

        <div id="setup-error" class="error-msg" hidden></div>
        <button type="submit" id="setup-btn">Connect</button>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" hidden>
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <button id="new-chat-btn" aria-label="New chat">+ New Chat</button>
      </div>
      <div id="conversation-list"></div>
      <div class="sidebar-footer">
        <button id="settings-btn" aria-label="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </button>
      </div>
    </aside>

    <!-- Mobile sidebar backdrop -->
    <div class="sidebar-backdrop"></div>

    <!-- Chat Area -->
    <main id="chat-area">
      <header id="chat-header">
        <button id="sidebar-toggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span id="header-title">dRAG</span>
      </header>

      <div id="messages">
        <div id="welcome-msg" class="welcome">
          <h2>Ask your library anything</h2>
          <p>Answers are grounded in your book collection with source citations.</p>
        </div>
      </div>

      <div id="input-area">
        <form id="chat-form">
          <textarea id="chat-input" placeholder="Ask a question..." rows="1"></textarea>
          <button type="submit" id="send-btn" aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </form>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
